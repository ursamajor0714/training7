<html>

<head>

    <meta charset="utf-8">

    <script>
        var a = 5;
        var b = 3;

        if (a > 3) {
            document.write("a는 0보다 크다" + "<br>")
        }

        else {
            document.write("a는 0보다 같거나 작다" + "<br>")
        }

        if (a < b) {
            document.write("a는 b보다 작다." + "<br>")
        }

        else {
            document.write("a는 b보다 크다." + "<br>")
        }
    </script>

</head>

<body>

</body>

</html>
